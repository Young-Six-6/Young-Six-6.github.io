name: GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - valaxy

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node-version: [20.x]
        os: [ubuntu-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org/
          # 关键修改：注释/删除 cache: 'npm'，避免锁文件检查报错
          # cache: 'npm'

      - name: Clean up deprecated npm config
        run: |
          rm -f .npmrc
          npm config delete shamefully-hoist
          npm config delete strict-peer-dependencies
          npm config delete always-auth

      - name: 📦 Install Dependencies
        run: npm i

      - name: Fix katex compatibility issue
        run: |
          npm uninstall katex
          npm install katex@0.16.9 --save

      - name: 🌌 Build Valaxy Blog
        run: npm run build

      - name: 🪤 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
